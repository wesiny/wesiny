<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e6f2ff">
    <meta name="apple-mobile-web-app-title" content="梦角传讯">
    <title>梦角传讯 · 回复速度最长120s</title>
    <style>
        /* === 完整样式（与上版一致） === */
        html { touch-action: manipulation; height: 100%; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f7f8fa; color: #222; height: 100%; display: flex; flex-direction: column; overflow: hidden; font-size: 16px; }
        .func-bar { width:100%; display:flex; justify-content:center; align-items:center; gap:4px; padding:6px 4px; background:#ffffff; border-bottom:1px solid #eee; flex-wrap:wrap; flex-shrink:0; }
        .func-bar button { padding:4px 8px; border-radius:10px; border:1px solid #ddd; background:#f5f5f5; font-size:12px; color:#444; white-space:nowrap; transition:all 0.1s; }
        .func-bar button:active { background:#e5e5e5; transform:scale(0.96); }
        .func-bar .speed-btn { background:#e8f0fe; border-color:#4088e0; color:#1a5bb5; font-weight:500; }
        .top-bar { width:100%; display:flex; justify-content:center; align-items:center; gap:6px; padding:6px 6px; background:#ffffff; border-bottom:1px solid #eee; flex-shrink:0; }
        .top-bar span { font-size:18px; color:#333; font-weight:500; }
        .top-bar .dot { width:7px; height:7px; background-color:#4caf50; border-radius:50%; display:inline-block; margin-right:4px; }
        .chat-box { flex:1; overflow-y:auto; padding:8px 6px 12px 6px; display:flex; flex-direction:column; gap:6px; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; min-height:0; }
        .scroll-anchor { height:1px; flex-shrink:0; }
        .chat-input-area { flex-shrink:0; display:flex; gap:6px; align-items:center; padding:6px 6px calc(6px + env(safe-area-inset-bottom)); background:#f7f8fa; border-top:1px solid #e5e7eb; }
        .chat-input-area input { flex:1; padding:10px 12px; border:1px solid #e5e7eb; border-radius:18px; font-size:16px !important; min-font-size:16px; outline:none; background:#fff; }
        .chat-input-area button { width:70px; padding:10px 0; border-radius:18px; border:none; background:#4088e0; color:#fff; font-size:clamp(18px,4vw,22px); font-weight:500; transition:background 0.2s; }
        .chat-input-area button:active { background:#2a6fb8; }
        .mode-toggle { padding:6px 10px; border-radius:18px; border:1px solid #ddd; background:#f0f0f0; font-size:13px; color:#555; white-space:nowrap; cursor:pointer; flex-shrink:0; }
        .mode-toggle.active { background:#4088e0; color:#fff; border-color:#4088e0; }
        .mask { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; display:none; align-items:center; justify-content:center; padding:10px; }
        .pop { width:100%; max-width:420px; background:#fff; border-radius:14px; padding:16px; max-height:90vh; overflow-y:auto; }
        .pop h3 { font-size:18px; margin-bottom:12px; }
        .pop textarea { width:100%; height:100px; font-size:16px; padding:8px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; resize:vertical; }
        .pop .file-box { margin-bottom:10px; }
        .pop .btn-row { display:flex; gap:8px; justify-content:flex-end; }
        .pop button { padding:6px 12px; border-radius:8px; border:none; font-size:15px; cursor:pointer; }
        .btn-blue { background:#4088e0; color:#fff; }
        .btn-blue:active { background:#2a6fb8; }
        .btn-red { background:#f44336; color:#fff; }
        .btn-red:active { background:#c62828; }
        .btn-gray { background:#999; color:#fff; }
        .btn-gray:active { background:#777; }
        .pop .avatar-setting { display:flex; gap:12px; margin-bottom:12px; }
        .pop .avatar-item { flex:1; text-align:center; }
        .pop .avatar-preview { width:64px; height:64px; border-radius:50%; background:#eee; margin:0 auto 8px; overflow:hidden; }
        .pop .avatar-preview img { width:100%; height:100%; object-fit:cover; }
        .pop input[type="file"] { width:100%; font-size:14px; }
        .card-list { max-height:240px; overflow-y:auto; border:1px solid #eee; border-radius:8px; margin:8px 0 12px; }
        .card-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-bottom:1px solid #eee; font-size:16px; gap:8px; }
        .card-item:last-child { border-bottom:none; }
        .card-item .del-btn { flex-shrink:0; padding:2px 6px; font-size:13px; }
        .card-bottom-btns { display:flex; gap:8px; margin-top:10px; }
        .card-bottom-btns button { padding:6px 12px; border-radius:8px; border:none; font-size:14px; }
        .calendar-wrap { width:100%; }
        .calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .calendar-header h3 { margin:0; }
        .calendar-nav { display:flex; align-items:center; gap:4px; }
        .calendar-nav button { background:none; border:none; font-size:22px; padding:0 8px; cursor:pointer; }
        .calendar-nav #calToday { font-size:14px; background:#4088e0; color:#fff; border-radius:6px; padding:2px 10px; border:none; }
        .calendar-role-tab { display:flex; gap:8px; margin-bottom:10px; }
        .calendar-role-tab button { flex:1; padding:6px; border:1px solid #ddd; border-radius:8px; background:#f8f8f8; cursor:pointer; font-size:15px; }
        .calendar-role-tab button.active { background:#4088e0; color:#fff; border-color:#4088e0; }
        .emoji-select { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
        .emoji-item { width:40px; height:40px; font-size:22px; display:flex; align-items:center; justify-content:center; border:1px solid #eee; border-radius:8px; position:relative; cursor:pointer; }
        .emoji-item.active { border:2px solid #4088e0; }
        .emoji-item .emo-del { position:absolute; top:-4px; right:-4px; width:14px; height:14px; font-size:10px; background:#f44336; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .calendar-week { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:6px; }
        .calendar-week span { font-size:14px; color:#666; }
        .calendar-days { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
        .day-cell { aspect-ratio:1/1; border:1px solid #eee; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:15px; position:relative; cursor:pointer; transition:background 0.1s; }
        .day-cell.today { border:2px solid #4caf50; }
        .day-cell .emo-mark { font-size:16px; position:absolute; bottom:2px; }
        .calendar-bottom-btn { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:14px; }
        .calendar-bottom-btn button { padding:6px 0; border-radius:8px; border:none; font-size:14px; cursor:pointer; }
        .calendar-add-emo-btn { width:100%; margin-top:8px; padding:6px; border-radius:8px; border:none; font-size:14px; cursor:pointer; }
        .emo-edit-item { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
        .emo-edit-item input { padding:6px; border:1px solid #ddd; border-radius:6px; flex:1; font-size:14px; }
        .emo-list-box { max-height:160px; overflow-y:auto; border:1px solid #eee; border-radius:8px; padding:8px; margin:10px 0; }
        .emo-list-box .emo-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #f0f0f0; }
        .emo-list-box .emo-row:last-child { border-bottom:none; }
        .chat-item { padding:8px 12px; border-radius:14px; line-height:1.5; font-size:clamp(17px,4.2vw,22px); max-width:75%; word-break:break-all; }
        .chat-item.system { align-self:center; background:#eef2f7; color:#666; font-size:clamp(14px,3.2vw,17px); text-align:center; max-width:85%; border-radius:8px; padding:4px 10px; }
        .chat-item.user { background:#4088e0; color:#fff; border-bottom-right-radius:3px; }
        .chat-item.ai { background:#ffffff; border-bottom-left-radius:3px; box-shadow:0 1px 2px rgba(0,0,0,0.06); }
        .chat-row { display:flex; align-items:flex-end; gap:8px; max-width:100%; }
        .chat-row.user { justify-content:flex-end; }
        .chat-row.ai { justify-content:flex-start; }
        .avatar { width:40px; height:40px; border-radius:50%; background:#ddd; flex-shrink:0; overflow:hidden; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .import-hint { font-size:13px; color:#888; margin-bottom:6px; line-height:1.6; }
        .import-hint code { background:#f0f0f0; padding:1px 6px; border-radius:4px; font-size:13px; }
        @media (max-width:480px) {
            .func-bar button { font-size:11px; padding:3px 6px; }
            .top-bar span { font-size:16px; }
            .pop h3 { font-size:16px; }
            .pop button { font-size:14px; padding:5px 10px; }
            .pop textarea { font-size:15px; }
            .card-item { font-size:15px; padding:6px 8px; }
            .card-item .del-btn { font-size:12px; }
            .calendar-header h3 { font-size:16px; }
            .calendar-nav button { font-size:20px; }
            .calendar-role-tab button { font-size:14px; padding:5px; }
            .emoji-item { width:36px; height:36px; font-size:20px; }
            .calendar-week span { font-size:13px; }
            .day-cell { font-size:14px; }
            .day-cell .emo-mark { font-size:14px; }
            .calendar-bottom-btn button { font-size:13px; padding:5px 0; }
            .calendar-add-emo-btn { font-size:13px; }
            .emo-edit-item input { font-size:13px; }
            .import-hint { font-size:12px; }
            .chat-item { font-size:clamp(16px,4vw,20px); padding:6px 10px; }
            .chat-item.system { font-size:clamp(13px,3vw,16px); }
            .chat-input-area input { font-size:16px !important; padding:8px 10px; }
            .chat-input-area button { font-size:clamp(17px,4vw,20px); padding:8px 0; width:60px; }
            .mode-toggle { font-size:12px; padding:4px 8px; }
            .avatar { width:36px; height:36px; }
        }
        @media (max-width:375px) {
            .func-bar button { font-size:10px; padding:2px 5px; }
            .top-bar span { font-size:15px; }
            .chat-item { font-size:clamp(15px,3.8vw,18px); }
            .chat-input-area button { width:55px; font-size:16px; }
        }
    </style>
</head>
<body>

    <div class="func-bar">
        <button id="avatarBtn">设置头像</button>
        <button id="importBtn">导入字卡</button>
        <button id="viewCardBtn">查看字卡</button>
        <button id="calendarBtn">情绪日历</button>
        <button id="clearRecordBtn">清空记录</button>
        <button id="speedBtn" class="speed-btn">⏱ 中速 (1.5s)</button>
    </div>

    <div class="top-bar">
        <span>梦角</span>
        <span class="dot"></span>
        <span>在线倾听中...</span>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="scroll-anchor" id="scrollAnchor"></div>
    </div>

    <div class="chat-input-area">
        <input id="msgInput" placeholder="输入你想说的话…" onkeydown="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">发送</button>
        <button class="mode-toggle" id="modeToggle">💬 自动回复</button>
    </div>

    <!-- 弹窗集合 -->
    <div class="mask" id="avatarMask">
        <div class="pop"><h3>设置双方头像</h3>
            <div class="avatar-setting">
                <div class="avatar-item"><div class="avatar-preview" id="userAvatarPreview"></div><p style="font-size:14px;margin-bottom:8px;">我的头像</p><input type="file" id="userAvatarInput" accept="image/*"></div>
                <div class="avatar-item"><div class="avatar-preview" id="aiAvatarPreview"></div><p style="font-size:14px;margin-bottom:8px;">梦角头像</p><input type="file" id="aiAvatarInput" accept="image/*"></div>
            </div>
            <div class="btn-row"><button id="avatarCancel">取消</button><button class="btn-blue" id="avatarConfirm">保存头像</button></div>
        </div>
    </div>

    <div class="mask" id="importMask">
        <div class="pop"><h3>批量导入回复字卡</h3>
            <div class="import-hint"><strong>支持三种方式（可同时使用）：</strong><br>① 普通文本：每行一句<br>② JSON数组：<code>["句子1","句子2"]</code><br>③ 上传 .txt / .json 文件</div>
            <textarea id="textArea" placeholder="普通文本示例：\n我一直陪着你\n别难过\n\nJSON示例：\n[&quot;我一直陪着你&quot;,&quot;别难过&quot;]"></textarea>
            <div class="file-box"><p style="font-size:14px;margin-bottom:8px;">📎 上传文件（.txt / .json）</p><input type="file" id="fileInput" accept=".txt,.json"></div>
            <div class="btn-row"><button id="importCancel">取消</button><button class="btn-blue" id="importConfirm">确认导入</button></div>
        </div>
    </div>

    <div class="mask" id="viewCardMask">
        <div class="pop"><h3>梦角自动回复字卡列表</h3><p style="font-size:14px;margin-bottom:8px;">所有梦角可自动回复文案，单条可删除</p>
            <div class="card-list" id="cardListWrap"></div>
            <div class="card-bottom-btns"><button class="btn-red" id="clearAllCard">清空全部字卡</button><button id="viewCardClose">关闭</button></div>
        </div>
    </div>

    <!-- 情绪日历弹窗 -->
    <div class="mask" id="calendarMask">
        <div class="pop calendar-wrap">
            <div class="calendar-header">
                <div class="calendar-nav"><button id="calPrev">&lt;</button></div>
                <h3 id="calTitle">2026年6月</h3>
                <div class="calendar-nav">
                    <button id="calToday">今天</button>
                    <button id="calNext">&gt;</button>
                </div>
            </div>
            <div class="calendar-role-tab">
                <button id="tabUser" class="active">我的情绪</button>
                <button id="tabAi">梦角情绪</button>
            </div>
            <div class="emoji-select" id="emojiBox"></div>
            <button class="btn-gray calendar-add-emo-btn" id="openEditEmo">自定义管理情绪</button>
            <div class="calendar-week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div class="calendar-days" id="calDaysBox"></div>
            <div class="calendar-bottom-btn" id="calActionBtns">
                <button id="calClearDay">清空当日标记</button>
                <button class="btn-blue" id="calSave">保存当日情绪</button>
                <button id="calClose">关闭</button>
            </div>
        </div>
    </div>

    <div class="mask" id="emoEditMask">
        <div class="pop"><h3>自定义情绪管理</h3>
            <div class="emo-edit-item"><input id="newEmoChar" placeholder="输入表情，如 😍"><input id="newEmoText" placeholder="情绪备注，如 想念"><button class="btn-blue" id="addNewEmo">添加</button></div>
            <div class="emo-list-box" id="customEmoList"></div>
            <div class="btn-row"><button id="closeEmoEdit">关闭</button></div>
        </div>
    </div>

    <script>
        // ==================== 核心变量 ====================
        const REPLY_KEY = "dreamReplyList";
        const STORAGE_KEY = "dreamChatRecord";
        const USER_AVATAR_KEY = "userAvatar";
        const AI_AVATAR_KEY = "aiAvatar";
        const CALENDAR_KEY = "dreamCalendarData";
        const CUSTOM_EMO_KEY = "dreamCustomEmo";
        const MODE_KEY = "replyMode";

        let chatRecords = [];
        let replyList = [];
        let userAvatar = "";
        let aiAvatar = "";
        let calNowDate = new Date();
        let calActiveRole = "user";
        let calSelectEmo = "";
        let calendarData = {};
        const baseEmoList = ["😊", "🥰", "😐", "😔", "😠", "😴"];
        let customEmoList = [];
        let allEmoList = [];
        let replyMode = "auto";
        let currentDelayIndex = 2;
        let selectedDateKey = null;

        // ========== 修改点：最慢 60s，随机 0.5~120s ==========
        const delayPresets = [
            { label: '即时', value: 0 },
            { label: '快速 (0.5s)', value: 500 },
            { label: '中速 (1.5s)', value: 1500 },
            { label: '慢速 (60s)', value: 60000 },
            { label: '随机 (0.5~120s)', value: 'random' }   // 标签更新
        ];

        function getDelay() {
            const preset = delayPresets[currentDelayIndex];
            if (preset.value === 'random') {
                // 0.5~120秒，单位毫秒：500 ~ 120000
                return 500 + Math.random() * 119500;
            }
            return preset.value;
        }
        // =====================================================

        function updateSpeedButton() {
            document.getElementById('speedBtn').textContent = '⏱ ' + delayPresets[currentDelayIndex].label;
        }
        function cycleSpeed() {
            currentDelayIndex = (currentDelayIndex + 1) % delayPresets.length;
            updateSpeedButton();
            showSystemMessage(`回复速度已切换为：${delayPresets[currentDelayIndex].label}`);
        }

        // ==================== 模式切换 ====================
        function loadMode() {
            const saved = localStorage.getItem(MODE_KEY);
            replyMode = (saved === "readonly") ? "readonly" : "auto";
            updateModeUI();
        }
        function saveMode() { localStorage.setItem(MODE_KEY, replyMode); }
        function updateModeUI() {
            const btn = document.getElementById("modeToggle");
            if (replyMode === "auto") {
                btn.textContent = "💬 自动回复";
                btn.classList.remove("active");
            } else {
                btn.textContent = "🔇 已读不回";
                btn.classList.add("active");
            }
        }
        function toggleMode() {
            replyMode = (replyMode === "auto") ? "readonly" : "auto";
            saveMode();
            updateModeUI();
            showSystemMessage(replyMode === "auto" ? "已切换为自动回复模式" : "已切换为已读不回模式（梦角将只显示已读）");
        }

        // ==================== 字卡导入解析 ====================
        function parseImportText(rawText) {
            const result = [];
            const trimText = rawText.trim();
            if (!trimText) return result;
            try {
                const parsed = JSON.parse(trimText);
                if (Array.isArray(parsed)) {
                    for (const item of parsed) {
                        if (typeof item === 'string') {
                            const clean = item.replace(/[\r\n]/g, '').trim();
                            if (clean) result.push(clean);
                        } else if (typeof item === 'number' || typeof item === 'boolean') {
                            result.push(String(item));
                        }
                    }
                    if (result.length > 0) return result;
                }
            } catch (_) {}
            const lines = trimText.split(/\r?\n/);
            for (const line of lines) {
                let clean = line.trim();
                if (!clean) continue;
                clean = clean.replace(/^["']|["']$/g, '').trim();
                if (clean.startsWith('[') && clean.endsWith(']')) {
                    const inner = clean.slice(1, -1).trim();
                    if (inner) {
                        const parts = inner.split(',').map(s => s.trim().replace(/^["']|["']$/g, '').trim());
                        for (const p of parts) if (p) result.push(p);
                        continue;
                    }
                }
                if (clean) result.push(clean);
            }
            return result;
        }

        // ==================== 情绪存储 ====================
        function loadCustomEmo() {
            const raw = localStorage.getItem(CUSTOM_EMO_KEY);
            if (raw) customEmoList = JSON.parse(raw);
            mergeAllEmo();
        }
        function saveCustomEmo() {
            localStorage.setItem(CUSTOM_EMO_KEY, JSON.stringify(customEmoList));
            mergeAllEmo();
        }
        function mergeAllEmo() {
            allEmoList = [...baseEmoList, ...customEmoList];
        }

        // ==================== 日历存储 ====================
        function loadCalendarData() {
            const raw = localStorage.getItem(CALENDAR_KEY);
            if (raw) calendarData = JSON.parse(raw);
        }
        function saveCalendarData() {
            localStorage.setItem(CALENDAR_KEY, JSON.stringify(calendarData));
        }
        function getDateKey(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, "0");
            const d = String(dateObj.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }
        function isDateInCurrentMonth(dateKey) {
            if (!dateKey) return false;
            const parts = dateKey.split('-');
            const year = parseInt(parts[0]);
            const month = parseInt(parts[1]) - 1;
            return (year === calNowDate.getFullYear() && month === calNowDate.getMonth());
        }

        // ==================== 渲染情绪面板 ====================
        function renderEmojiBox() {
            const box = document.getElementById("emojiBox");
            box.innerHTML = "";
            allEmoList.forEach(emo => {
                const div = document.createElement("div");
                div.className = "emoji-item";
                div.dataset.emo = emo;
                div.textContent = emo;
                if (emo === calSelectEmo) div.classList.add("active");
                if (!baseEmoList.includes(emo)) {
                    const del = document.createElement("span");
                    del.className = "emo-del";
                    del.textContent = "×";
                    del.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm(`删除自定义情绪 ${emo}？`)) {
                            customEmoList = customEmoList.filter(item => item !== emo);
                            saveCustomEmo();
                            renderEmojiBox();
                            renderCalendar();
                        }
                    };
                    div.appendChild(del);
                }
                div.onclick = () => {
                    document.querySelectorAll(".emoji-item").forEach(i => i.classList.remove("active"));
                    div.classList.add("active");
                    calSelectEmo = emo;
                };
                box.appendChild(div);
            });
        }

        // ==================== 渲染日历（修复版） ====================
        function renderCalendar() {
            const y = calNowDate.getFullYear();
            const m = calNowDate.getMonth();
            document.getElementById("calTitle").textContent = `${y}年${m + 1}月`;

            if (selectedDateKey && !isDateInCurrentMonth(selectedDateKey)) {
                selectedDateKey = null;
            }

            const firstDay = new Date(y, m, 1);
            const lastDay = new Date(y, m + 1, 0);
            const startWeek = firstDay.getDay();
            const totalDays = lastDay.getDate();
            const today = new Date();
            const todayKey = getDateKey(today);
            const box = document.getElementById("calDaysBox");
            box.innerHTML = "";

            for (let i = 0; i < startWeek; i++) {
                const empty = document.createElement("div");
                empty.className = "day-cell";
                box.appendChild(empty);
            }

            for (let d = 1; d <= totalDays; d++) {
                const cellDate = new Date(y, m, d);
                const key = getDateKey(cellDate);
                const cell = document.createElement("div");
                cell.className = "day-cell";
                if (key === todayKey) cell.classList.add("today");
                cell.dataset.date = key;

                if (key === selectedDateKey) {
                    cell.style.background = "#eef6ff";
                } else {
                    cell.style.background = "";
                }

                cell.innerHTML = `<span>${d}</span>`;
                if (calendarData[key]) {
                    const markSpan = document.createElement("span");
                    markSpan.className = "emo-mark";
                    if (calActiveRole === "user" && calendarData[key].user) {
                        markSpan.textContent = calendarData[key].user;
                    } else if (calActiveRole === "ai" && calendarData[key].ai) {
                        markSpan.textContent = calendarData[key].ai;
                    }
                    if (markSpan.textContent) cell.appendChild(markSpan);
                }

                cell.onclick = () => {
                    selectedDateKey = key;
                    renderCalendar();
                };
                box.appendChild(cell);
            }

            // 根据角色控制操作按钮显示
            const actionBtns = document.getElementById("calActionBtns");
            if (calActiveRole === 'ai') {
                actionBtns.style.display = 'none';
            } else {
                actionBtns.style.display = 'grid';
            }
        }

        // ==================== 自定义情绪列表 ====================
        function renderCustomEmoList() {
            const wrap = document.getElementById("customEmoList");
            wrap.innerHTML = "";
            if (customEmoList.length === 0) {
                const p = document.createElement("p");
                p.style.cssText = "color:#666;font-size:14px;";
                p.textContent = "暂无自定义情绪，添加后显示在这里";
                wrap.appendChild(p);
                return;
            }
            customEmoList.forEach(emo => {
                const row = document.createElement("div");
                row.className = "emo-row";
                const span = document.createElement("span");
                span.textContent = emo;
                row.appendChild(span);
                const btn = document.createElement("button");
                btn.className = "btn-red";
                btn.style.cssText = "font-size:12px;padding:2px 6px;";
                btn.textContent = "删除";
                btn.dataset.emo = emo;
                row.appendChild(btn);
                wrap.appendChild(row);
            });
            document.querySelectorAll("#customEmoList button").forEach(btn => {
                btn.onclick = () => {
                    const e = btn.dataset.emo;
                    customEmoList = customEmoList.filter(item => item !== e);
                    saveCustomEmo();
                    renderCustomEmoList();
                    renderEmojiBox();
                    renderCalendar();
                };
            });
        }

        // ==================== 日历交互绑定（修复版） ====================
        function bindCalendarEvent() {
            document.getElementById("tabUser").onclick = () => {
                calActiveRole = "user";
                document.getElementById("tabUser").classList.add("active");
                document.getElementById("tabAi").classList.remove("active");
                renderCalendar();
            };
            document.getElementById("tabAi").onclick = () => {
                calActiveRole = "ai";
                document.getElementById("tabAi").classList.add("active");
                document.getElementById("tabUser").classList.remove("active");
                calSelectEmo = "";
                renderCalendar();
            };

            document.getElementById("calPrev").onclick = () => {
                calNowDate = new Date(calNowDate.getFullYear(), calNowDate.getMonth() - 1, 1);
                if (selectedDateKey && !isDateInCurrentMonth(selectedDateKey)) selectedDateKey = null;
                renderCalendar();
            };
            document.getElementById("calNext").onclick = () => {
                calNowDate = new Date(calNowDate.getFullYear(), calNowDate.getMonth() + 1, 1);
                if (selectedDateKey && !isDateInCurrentMonth(selectedDateKey)) selectedDateKey = null;
                renderCalendar();
            };

            document.getElementById("calToday").onclick = () => {
                calNowDate = new Date();
                selectedDateKey = getDateKey(calNowDate);
                renderCalendar();
            };

            document.getElementById("calSave").onclick = () => {
                if (calActiveRole === 'ai') {
                    alert("梦角情绪由系统自动记录，无需手动保存");
                    return;
                }
                if (!calSelectEmo) {
                    alert("请先选择情绪表情！");
                    return;
                }
                let targetKey = selectedDateKey;
                if (!targetKey) {
                    targetKey = getDateKey(new Date());
                    selectedDateKey = targetKey;
                    renderCalendar();
                }
                if (!calendarData[targetKey]) calendarData[targetKey] = {};
                calendarData[targetKey][calActiveRole] = calSelectEmo;
                saveCalendarData();
                renderCalendar();
                alert(`情绪已保存到 ${targetKey}`);
            };

            document.getElementById("calClearDay").onclick = () => {
                if (calActiveRole === 'ai') {
                    alert("梦角情绪无法手动清空，由系统自动管理");
                    return;
                }
                if (!selectedDateKey) {
                    alert("请先点击日期格子，或使用「今天」按钮选中日期！");
                    return;
                }
                if (calendarData[selectedDateKey] && calendarData[selectedDateKey][calActiveRole]) {
                    delete calendarData[selectedDateKey][calActiveRole];
                    if (Object.keys(calendarData[selectedDateKey]).length === 0) delete calendarData[selectedDateKey];
                    saveCalendarData();
                    renderCalendar();
                    alert("已清空该日期情绪");
                } else {
                    alert("该日期暂无记录");
                }
            };

            document.getElementById("calClose").onclick = () => {
                document.getElementById("calendarMask").style.display = "none";
                calSelectEmo = "";
            };

            document.getElementById("openEditEmo").onclick = () => {
                document.getElementById("emoEditMask").style.display = "flex";
                renderCustomEmoList();
            };
            document.getElementById("closeEmoEdit").onclick = () => {
                document.getElementById("emoEditMask").style.display = "none";
            };
            document.getElementById("addNewEmo").onclick = () => {
                const char = document.getElementById("newEmoChar").value.trim();
                const text = document.getElementById("newEmoText").value.trim();
                if (!char) { alert("请输入表情符号"); return; }
                const fullEmo = `${char} ${text}`.trim();
                if (allEmoList.includes(fullEmo)) { alert("该情绪已存在"); return; }
                customEmoList.push(fullEmo);
                saveCustomEmo();
                renderCustomEmoList();
                renderEmojiBox();
                document.getElementById("newEmoChar").value = "";
                document.getElementById("newEmoText").value = "";
                alert("自定义情绪添加成功");
            };

            document.getElementById("calendarBtn").onclick = () => {
                calNowDate = new Date();
                calActiveRole = "user";
                calSelectEmo = "";
                selectedDateKey = getDateKey(calNowDate);
                document.getElementById("tabUser").classList.add("active");
                document.getElementById("tabAi").classList.remove("active");
                renderEmojiBox();
                renderCalendar();
                document.getElementById("calendarMask").style.display = "flex";
            };
        }

        // ==================== 自动记录梦角情绪 ====================
        function recordAiEmotion() {
            if (allEmoList.length === 0) return;
            const todayKey = getDateKey(new Date());
            if (!calendarData[todayKey]) calendarData[todayKey] = {};
            const randomEmo = allEmoList[Math.floor(Math.random() * allEmoList.length)];
            calendarData[todayKey].ai = randomEmo;
            saveCalendarData();
        }

        // ==================== 字卡逻辑 ====================
        function loadReply() {
            const local = localStorage.getItem(REPLY_KEY);
            if (local) replyList = JSON.parse(local);
            else {
                replyList = ["我一直在呢，不要难过。", "我懂你的情绪，你已经很努力了。", "慢慢来，我会一直陪着你。", "你超棒的，请多偏爱自己一点。", "所有委屈我都接住了。", "别焦虑，一切都会慢慢变好。", "我永远站在你这边。", "你的心意，我全部收到。", "累了就停下来，我陪着你休息。", "你值得所有温柔与偏爱。"];
                saveReply();
            }
        }
        function saveReply() { localStorage.setItem(REPLY_KEY, JSON.stringify(replyList)); }

        function renderCardList() {
            const wrap = document.getElementById("cardListWrap");
            wrap.innerHTML = "";
            if (replyList.length === 0) {
                const p = document.createElement("p");
                p.style.cssText = "text-align:center;color:#999;padding:20px 0;";
                p.textContent = "暂无字卡，请先导入";
                wrap.appendChild(p);
                return;
            }
            replyList.forEach((text, index) => {
                const div = document.createElement("div");
                div.className = "card-item";
                const span = document.createElement("span");
                span.textContent = text;
                div.appendChild(span);
                const btn = document.createElement("button");
                btn.className = "del-btn btn-red";
                btn.textContent = "删除";
                btn.dataset.idx = index;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`确定删除这条字卡：\n${replyList[index]}`)) {
                        replyList.splice(index, 1);
                        saveReply();
                        renderCardList();
                    }
                };
                div.appendChild(btn);
                wrap.appendChild(div);
            });
        }
        function bindClearAllCard() {
            document.getElementById("clearAllCard").onclick = () => {
                if (confirm("确定清空所有回复字卡？删除后无法恢复！")) {
                    replyList = [];
                    saveReply();
                    renderCardList();
                    alert("已清空全部字卡");
                }
            };
        }

        // ==================== 头像（压缩） ====================
        function loadAvatars() {
            userAvatar = localStorage.getItem(USER_AVATAR_KEY) || "";
            aiAvatar = localStorage.getItem(AI_AVATAR_KEY) || "";
            refreshAvatarPreviews();
        }
        function refreshAvatarPreviews() {
            const userPreview = document.getElementById("userAvatarPreview");
            const aiPreview = document.getElementById("aiAvatarPreview");
            userPreview.innerHTML = userAvatar ? `<img src="${userAvatar}" alt="">` : "";
            aiPreview.innerHTML = aiAvatar ? `<img src="${aiAvatar}" alt="">` : "";
        }
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 128;
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ==================== 聊天记录 ====================
        function initChatRecord() {
            const local = localStorage.getItem(STORAGE_KEY);
            const chatBox = document.getElementById("chatBox");
            if (!local) {
                chatRecords = [];
                showSystemMessage("已成功建立心灵链接，随时可以向我倾诉✨");
                return;
            }
            chatRecords = JSON.parse(local);
            const MAX_RECORDS = 500;
            if (chatRecords.length > MAX_RECORDS) {
                chatRecords = chatRecords.slice(-MAX_RECORDS);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(chatRecords));
            }
            chatRecords.forEach(item => appendMessage(item.sender, item.text, item.isUser, false));
            scrollToBottom();
        }
        function showSystemMessage(text) {
            const chatBox = document.getElementById("chatBox");
            const anchor = document.getElementById("scrollAnchor");
            const sysItem = document.createElement("div");
            sysItem.className = "chat-item system";
            sysItem.textContent = text;
            chatBox.insertBefore(sysItem, anchor);
            scrollToBottom();
        }
        function appendMessage(sender, text, isUser = false, save = true) {
            const box = document.getElementById("chatBox");
            const row = document.createElement("div");
            row.className = `chat-row ${isUser ? "user" : "ai"}`;
            const avatar = document.createElement("div");
            avatar.className = "avatar";
            const avatarSrc = isUser ? userAvatar : aiAvatar;
            if (avatarSrc) avatar.innerHTML = `<img src="${avatarSrc}" alt="">`;
            const bubble = document.createElement("div");
            bubble.className = `chat-item ${isUser ? "user" : "ai"}`;
            bubble.textContent = text;
            if (isUser) { row.appendChild(bubble); row.appendChild(avatar); } else { row.appendChild(avatar); row.appendChild(bubble); }
            const anchor = document.getElementById("scrollAnchor");
            box.insertBefore(row, anchor);
            if (save) {
                chatRecords.push({ sender, text, isUser });
                if (chatRecords.length > 500) chatRecords = chatRecords.slice(-500);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(chatRecords));
            }
            scrollToBottom();
        }
        function scrollToBottom() {
            const anchor = document.getElementById("scrollAnchor");
            if (anchor) anchor.scrollIntoView({ behavior: 'auto', block: 'end' });
            const box = document.getElementById("chatBox");
            if (box) box.scrollTop = box.scrollHeight;
        }

        // ==================== 发送消息 ====================
        function sendMsg() {
            const input = document.getElementById("msgInput");
            const text = input.value.trim();
            if (!text) return;
            appendMessage("你", text, true);
            input.value = "";
            const delayMs = getDelay();

            if (replyMode === "readonly") {
                setTimeout(() => showSystemMessage("梦角已读"), Math.min(delayMs, 500));
            } else {
                setTimeout(() => {
                    if (replyList.length === 0) {
                        appendMessage("梦角", "暂无回复字卡，请先导入文案", false);
                        return;
                    }
                    const r = replyList[Math.floor(Math.random() * replyList.length)];
                    appendMessage("梦角", r, false);
                    recordAiEmotion();
                }, delayMs);
            }
        }

        // ==================== 初始化 ====================
        window.onload = () => {
            loadMode();
            loadReply();
            renderCardList();
            bindClearAllCard();
            loadAvatars();
            initChatRecord();
            loadCalendarData();
            loadCustomEmo();
            bindCalendarEvent();
            updateSpeedButton();

            document.getElementById("modeToggle").addEventListener("click", toggleMode);
            document.getElementById("speedBtn").addEventListener("click", cycleSpeed);

            // 头像弹窗
            const avatarMask = document.getElementById("avatarMask");
            document.getElementById("avatarBtn").onclick = () => avatarMask.style.display = "flex";
            document.getElementById("avatarCancel").onclick = () => avatarMask.style.display = "none";
            document.getElementById("avatarConfirm").onclick = () => {
                localStorage.setItem(USER_AVATAR_KEY, userAvatar);
                localStorage.setItem(AI_AVATAR_KEY, aiAvatar);
                alert("头像已保存！");
                avatarMask.style.display = "none";
            };
            document.getElementById("userAvatarInput").addEventListener("change", e => {
                const f = e.target.files[0];
                if (!f) return;
                compressImage(f, (dataUrl) => { userAvatar = dataUrl; refreshAvatarPreviews(); });
            });
            document.getElementById("aiAvatarInput").addEventListener("change", e => {
                const f = e.target.files[0];
                if (!f) return;
                compressImage(f, (dataUrl) => { aiAvatar = dataUrl; refreshAvatarPreviews(); });
            });

            // 导入弹窗
            const importMask = document.getElementById("importMask");
            document.getElementById("importBtn").onclick = () => importMask.style.display = "flex";
            document.getElementById("importCancel").onclick = () => {
                importMask.style.display = "none";
                document.getElementById("textArea").value = "";
                document.getElementById("fileInput").value = "";
            };
            document.getElementById("importConfirm").onclick = async () => {
                let totalArr = [];
                const textRaw = document.getElementById("textArea").value.trim();
                if (textRaw) totalArr = totalArr.concat(parseImportText(textRaw));
                const file = document.getElementById("fileInput").files[0];
                if (file) {
                    try {
                        const fileText = await file.text();
                        totalArr = totalArr.concat(parseImportText(fileText));
                    } catch (err) { alert("文件读取失败：" + err.message); return; }
                }
                const unique = [];
                const seen = new Set();
                for (const item of totalArr) {
                    const key = item.trim();
                    if (key && !seen.has(key)) { seen.add(key); unique.push(key); }
                }
                if (unique.length === 0) {
                    alert("未检测到有效字卡内容！支持：\n• 每行一句的普通文本\n• JSON数组 [\"句子1\",\"句子2\"]\n• .txt / .json 文件");
                    return;
                }
                replyList = [...replyList, ...unique];
                saveReply();
                renderCardList();
                alert(`✅ 导入成功！新增 ${unique.length} 条字卡（去重后）`);
                importMask.style.display = "none";
                document.getElementById("textArea").value = "";
                document.getElementById("fileInput").value = "";
            };

            // 查看字卡
            const viewCardMask = document.getElementById("viewCardMask");
            document.getElementById("viewCardBtn").onclick = () => { renderCardList(); viewCardMask.style.display = "flex"; };
            document.getElementById("viewCardClose").onclick = () => viewCardMask.style.display = "none";

            // 清空记录
            document.getElementById("clearRecordBtn").addEventListener("click", function() {
                if (confirm("确定清空全部聊天记录？删除后无法恢复！")) {
                    localStorage.removeItem(STORAGE_KEY);
                    chatRecords = [];
                    document.getElementById("chatBox").innerHTML = `<div class="scroll-anchor" id="scrollAnchor"></div>`;
                    showSystemMessage("已成功建立心灵链接，随时可以向我倾诉✨");
                }
            });
        };
    </script>
</body>
</html>
