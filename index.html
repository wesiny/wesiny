<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f3e8ff">
    <meta name="apple-mobile-web-app-title" content="梦角传讯">
    <title>梦角传讯</title>
    <style>
        html {
            touch-action: manipulation;
            height: 100%;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #faf8ff;
            color: #2d2a3e;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 16px;
            line-height: 1.5;
        }

        /* ===== 顶部标题栏 ===== */
        .app-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(200, 180, 220, 0.25);
            flex-shrink: 0;
            min-height: 56px;
        }
        .app-header .title {
            font-size: 18px;
            font-weight: 600;
            color: #3d2e5c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-header .title .moon {
            font-size: 22px;
        }
        .app-header .menu-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: none;
            background: rgba(176, 136, 208, 0.2);
            color: #4a3f5e;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .app-header .menu-btn:active {
            transform: scale(0.92);
            background: rgba(176, 136, 208, 0.35);
        }
        .app-header .menu-btn .icon {
            font-size: 18px;
        }

        /* ===== 聊天区域 ===== */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px 16px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
            background: linear-gradient(180deg, #faf8ff 0%, #f3edfc 100%);
        }
        .scroll-anchor {
            height: 1px;
            flex-shrink: 0;
        }

        /* ===== 输入区域 ===== */
        .chat-input-area {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(200, 180, 220, 0.25);
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(180, 160, 200, 0.3);
            border-radius: 30px;
            font-size: 16px !important;
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            transition: border 0.2s, box-shadow 0.2s;
        }
        .chat-input-area input:focus {
            border-color: #b088d0;
            box-shadow: 0 0 0 3px rgba(176, 136, 208, 0.15);
        }
        .chat-input-area .send-btn {
            padding: 12px 22px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #b088d0, #8f6db0);
            color: #fff;
            font-size: clamp(17px, 4vw, 20px);
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(143, 109, 176, 0.25);
            cursor: pointer;
            white-space: nowrap;
        }
        .chat-input-area .send-btn:active {
            transform: scale(0.94);
            box-shadow: 0 2px 6px rgba(143, 109, 176, 0.2);
        }
        .chat-input-area .send-btn:disabled {
            opacity: 0.5;
            transform: scale(0.98);
            cursor: not-allowed;
        }

        /* ===== 状态显示（输入框旁边） ===== */
        .status-badge {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            min-width: 60px;
            text-align: center;
            transition: all 0.3s;
            flex-shrink: 0;
            background: rgba(200, 180, 220, 0.15);
            color: #8a7a9a;
        }
        .status-badge.sending {
            background: rgba(255, 200, 100, 0.2);
            color: #b08830;
        }
        .status-badge.read {
            background: rgba(123, 207, 166, 0.25);
            color: #2a7a4a;
        }
        .status-badge.unread {
            background: rgba(245, 180, 180, 0.2);
            color: #9a3a3a;
        }

        /* ===== 功能菜单 ===== */
        .func-menu-mask {
            position: fixed;
            inset: 0;
            background: rgba(30, 20, 45, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .func-menu-mask.open {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .func-menu {
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 20px 18px 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow-y: auto;
        }
        .func-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(200, 180, 220, 0.2);
        }
        .func-menu-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: #3d2e5c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .func-menu-header .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(200, 180, 220, 0.2);
            font-size: 20px;
            color: #4a3f5e;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .func-menu-header .close-btn:active {
            transform: scale(0.88);
            background: rgba(200, 180, 220, 0.4);
        }
        .func-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .func-grid .func-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 6px 12px;
            border-radius: 16px;
            border: none;
            background: rgba(240, 235, 248, 0.5);
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            min-height: 80px;
            gap: 4px;
        }
        .func-grid .func-item:active {
            transform: scale(0.92);
            background: rgba(200, 180, 220, 0.3);
        }
        .func-grid .func-item .fi-icon {
            font-size: 28px;
            line-height: 1.2;
        }
        .func-grid .func-item .fi-label {
            font-size: 12px;
            font-weight: 500;
            color: #4a3f5e;
            line-height: 1.3;
            max-width: 100%;
            word-break: break-word;
        }
        .func-grid .func-item .fi-sub {
            font-size: 10px;
            color: #8a7a9a;
            font-weight: 400;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .func-grid .func-item.danger {
            background: rgba(245, 180, 180, 0.3);
        }
        .func-grid .func-item.danger:active {
            background: rgba(245, 180, 180, 0.5);
        }
        .func-grid .func-item.danger .fi-label {
            color: #7a3a3a;
        }
        .func-grid .func-item.speed-item {
            background: rgba(176, 136, 208, 0.15);
            border: 1px solid rgba(176, 136, 208, 0.15);
        }
        .func-grid .func-item.speed-item:active {
            background: rgba(176, 136, 208, 0.3);
        }
        .func-menu-footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(200, 180, 220, 0.15);
            text-align: center;
            font-size: 12px;
            color: #9a8aaa;
        }

        /* ===== 通用弹窗 ===== */
        .mask {
            position: fixed;
            inset: 0;
            background: rgba(30, 20, 45, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 99;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .mask.open {
            display: flex;
        }
        .pop {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 22px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .pop h3 {
            font-size: 20px;
            font-weight: 600;
            color: #3d2e5c;
            margin-bottom: 14px;
        }
        .pop textarea {
            width: 100%;
            height: 120px;
            font-size: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(180, 160, 200, 0.3);
            border-radius: 16px;
            margin-bottom: 12px;
            resize: vertical;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
        }
        .pop .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .pop button {
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-blue {
            background: linear-gradient(135deg, #b088d0, #8f6db0);
            color: #fff;
            box-shadow: 0 4px 12px rgba(143, 109, 176, 0.2);
        }
        .btn-blue:active {
            transform: scale(0.94);
        }
        .btn-red {
            background: #f5b3b3;
            color: #5e3a3a;
        }
        .btn-red:active {
            background: #e89a9a;
        }
        .btn-gray {
            background: #d5cce0;
            color: #3d2e5c;
        }
        .btn-gray:active {
            background: #c2b6d0;
        }
        .btn-gold {
            background: #f0d5a0;
            color: #6a4f2a;
        }
        .btn-gold:active {
            background: #e8c88a;
        }

        /* ===== 头像设置 ===== */
        .pop .avatar-setting {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .pop .avatar-item {
            flex: 1;
            text-align: center;
        }
        .pop .avatar-preview {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e8e0f0;
            margin: 0 auto 10px;
            overflow: hidden;
            border: 2px solid rgba(200, 180, 220, 0.3);
        }
        .pop .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .pop input[type="file"] {
            width: 100%;
            font-size: 14px;
            color: #4a3f5e;
        }

        /* ===== 字卡列表 ===== */
        .card-list {
            max-height: 240px;
            overflow-y: auto;
            border-radius: 16px;
            margin: 10px 0 14px;
            background: rgba(255, 255, 255, 0.5);
        }
        .card-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(200, 180, 220, 0.15);
            font-size: 15px;
            gap: 10px;
        }
        .card-item:last-child {
            border-bottom: none;
        }
        .card-item .del-btn {
            flex-shrink: 0;
            padding: 4px 12px;
            font-size: 13px;
            border-radius: 16px;
        }
        .card-bottom-btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .card-bottom-btns button {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .import-hint {
            font-size: 13px;
            color: #6a5a7a;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .import-hint code {
            background: rgba(176, 136, 208, 0.15);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 13px;
        }
        .pop .file-box {
            margin-bottom: 12px;
        }

        /* ===== 日历 ===== */
        .calendar-wrap {
            width: 100%;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .calendar-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: #3d2e5c;
            margin: 0;
        }
        .calendar-nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .calendar-nav button {
            background: none;
            border: none;
            font-size: 22px;
            padding: 0 8px;
            cursor: pointer;
            color: #4a3f5e;
        }
        .calendar-nav #calToday {
            font-size: 14px;
            background: rgba(176, 136, 208, 0.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-weight: 500;
        }
        .calendar-role-tab {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .calendar-role-tab button {
            flex: 1;
            padding: 8px;
            border: 1px solid rgba(180, 160, 200, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .calendar-role-tab button.active {
            background: #b088d0;
            color: #fff;
            border-color: #b088d0;
        }
        .emoji-select {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .emoji-item {
            width: 44px;
            height: 44px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(180, 160, 200, 0.2);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.15s;
        }
        .emoji-item.active {
            border: 2px solid #b088d0;
            background: rgba(176, 136, 208, 0.1);
        }
        .emoji-item .emo-del {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            font-size: 11px;
            background: #f5b3b3;
            color: #5e3a3a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .calendar-week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }
        .calendar-week span {
            font-size: 14px;
            color: #6a5a7a;
            font-weight: 500;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .day-cell {
            aspect-ratio: 1/1;
            border: 1px solid rgba(200, 180, 220, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            position: relative;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.15s;
        }
        .day-cell.today {
            border: 2px solid #7bcfa6;
        }
        .day-cell .emo-mark {
            font-size: 18px;
            position: absolute;
            bottom: 2px;
        }
        .calendar-bottom-btn {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }
        .calendar-bottom-btn button {
            padding: 8px 0;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .calendar-add-emo-btn {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
        }

        /* ===== 情绪编辑 ===== */
        .emo-edit-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }
        .emo-edit-item input {
            padding: 8px 14px;
            border: 1px solid rgba(180, 160, 200, 0.3);
            border-radius: 16px;
            flex: 1;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.5);
        }
        .emo-list-box {
            max-height: 160px;
            overflow-y: auto;
            border-radius: 16px;
            padding: 8px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.3);
        }
        .emo-list-box .emo-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(200, 180, 220, 0.1);
        }
        .emo-list-box .emo-row:last-child {
            border-bottom: none;
        }

        /* ===== 信件箱 ===== */
        .mail-list {
            max-height: 400px;
            overflow-y: auto;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 0;
        }
        .mail-item {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(200, 180, 220, 0.1);
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 8px;
            margin: 0 4px;
        }
        .mail-item:last-child {
            border-bottom: none;
        }
        .mail-item:active {
            background: rgba(176, 136, 208, 0.08);
        }
        .mail-item .mail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #6a5a7a;
            margin-bottom: 4px;
        }
        .mail-item .mail-header .status {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 12px;
            background: rgba(200, 180, 220, 0.2);
        }
        .mail-item .mail-header .status.delivered {
            background: rgba(123, 207, 166, 0.3);
            color: #2a6a4a;
        }
        .mail-item .mail-header .status.replied {
            background: rgba(176, 136, 208, 0.3);
            color: #5a3a7a;
        }
        .mail-item .mail-content {
            font-size: 15px;
            color: #2d2a3e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mail-item .mail-reply {
            font-size: 14px;
            color: #5a4a6a;
            margin-top: 4px;
            padding-left: 12px;
            border-left: 3px solid rgba(176, 136, 208, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mail-item .mail-reply::before {
            content: "💌 回信: ";
            color: #8a7a9a;
        }

        /* ===== 聊天消息 ===== */
        .chat-item {
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: clamp(16px, 4.2vw, 20px);
            max-width: 80%;
            word-break: break-word;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .chat-item.system {
            align-self: center;
            background: rgba(200, 180, 220, 0.2);
            backdrop-filter: blur(4px);
            color: #5a4a6a;
            font-size: clamp(13px, 3.2vw, 16px);
            text-align: center;
            max-width: 85%;
            border-radius: 30px;
            padding: 6px 18px;
        }
        .chat-item.user {
            background: linear-gradient(135deg, #b088d0, #9b77bb);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 14px rgba(143, 109, 176, 0.15);
        }
        .chat-item.ai {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
        }
        .msg-time {
            font-size: 11px;
            color: #9a8aaa;
            margin-top: 5px;
            text-align: right;
            letter-spacing: 0.3px;
            opacity: 0.8;
            padding-right: 2px;
            display: block;
            clear: both;
        }
        .chat-item.user .msg-time {
            color: rgba(255, 255, 255, 0.75);
        }
        .chat-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 100%;
        }

<body>

    <!-- ===== 顶部标题栏 ===== -->
    <header class="app-header">
        <div class="title">
            <span class="moon">🌙</span> 梦角传讯
        </div>

    <!-- ===== 输入区域 ===== -->
    <div class="chat-input-area">

        <span class="status-badge" id="statusBadge">💬 就绪</span>

    </div>

    <!-- ============================================================
    功能菜单
    ============================================================ -->
    <div class="func-menu-mask" id="funcMenuMask">
        <div class="func-menu">
            <div class="func-menu-header">
                <h3>⚙️ 功能菜单</h3>

                <button class="func-item" id="menuImport"><span class="fi-icon">📥</span><span class="fi-label">导入字卡</span></button>
                <button class="func-item" id="menuViewCard"><span class="fi-icon">📋</span><span class="fi-label">字卡库</span></button>

                <button class="func-item" id="menuMailbox"><span class="fi-icon">📬</span><span class="fi-label">信件箱</span></button>
                <button class="func-item speed-item" id="menuSpeed"><span class="fi-icon">⏱</span><span class="fi-label" id="menuSpeedLabel">中速</span><span class="fi-sub" id="menuSpeedSub">1.5s</span></button>
                <button class="func-item danger" id="menuClear"><span class="fi-icon">🗑️</span><span class="fi-label">清空记录</span></button>

            <div class="func-menu-footer">💡 点击功能按钮执行操作</div>

    <!-- ============================================================
    功能弹窗

    <!-- 头像 -->

                <div class="avatar-item"><div class="avatar-preview" id="aiAvatarPreview"></div><p style="font-size:14px;color:#4a3f5e;">梦角头像</p><input type="file" id="aiAvatarInput" accept="image/*"></div>
            </div>
            <div class="btn-row"><button id="avatarCancel" class="btn-gray">取消</button><button class="btn-blue" id="avatarConfirm">保存</button></div>
        </div>
    </div>

    <!-- 导入字卡 -->
    <div class="mask" id="importMask">
        <div class="pop">
            <h3>📥 批量导入字卡</h3>
            <div class="import-hint"><strong>支持三种方式（可同时使用）：</strong><br>① 每行一句的文本<br>② JSON数组 <code>["句子1","句子2"]</code><br>③ 上传 .txt / .json 文件</div>
            <textarea id="textArea" placeholder="普通文本示例：\n我一直陪着你\n别难过\n\nJSON示例：\n[&quot;我一直陪着你&quot;,&quot;别难过&quot;]"></textarea>
            <div class="file-box"><p style="font-size:14px;color:#4a3f5e;margin-bottom:6px;">📎 上传文件</p><input type="file" id="fileInput" accept=".txt,.json"></div>
            <div class="btn-row"><button id="importCancel" class="btn-gray">取消</button><button class="btn-blue" id="importConfirm">导入</button></div>
        </div>
    </div>

    <!-- 字卡库 -->
    <div class="mask" id="viewCardMask">
        <div class="pop">
            <h3>📋 字卡库</h3>
            <p style="font-size:14px;color:#6a5a7a;margin-bottom:8px;">梦角可自动回复的文案，单条可删除</p>
            <div class="card-list" id="cardListWrap"></div>
            <div class="card-bottom-btns"><button class="btn-red" id="clearAllCard">清空全部</button><button id="viewCardClose" class="btn-gray">关闭</button></div>
        </div>
    </div>

    <!-- 情绪日历 -->
    <div class="mask" id="calendarMask">
        <div class="pop calendar-wrap">
            <div class="calendar-header">
                <div class="calendar-nav"><button id="calPrev">‹</button></div>
                <h3 id="calTitle">2026年6月</h3>
                <div class="calendar-nav"><button id="calToday">今天</button><button id="calNext">›</button></div>
            </div>
            <div class="calendar-role-tab"><button id="tabUser" class="active">😊 我的情绪</button><button id="tabAi">🌙 梦角情绪</button></div>
            <div class="emoji-select" id="emojiBox"></div>
            <button class="btn-gray calendar-add-emo-btn" id="openEditEmo">✏️ 自定义管理情绪</button>
            <div class="calendar-week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div class="calendar-days" id="calDaysBox"></div>
            <div class="calendar-bottom-btn" id="calActionBtns">
                <button id="calClearDay" class="btn-gray">清空标记</button>
                <button class="btn-blue" id="calSave">💾 保存</button>
                <button id="calClose" class="btn-gray">关闭</button>
            </div>
        </div>

    <!-- 情绪编辑 -->
    <div class="mask" id="emoEditMask">
        <div class="pop">
            <h3>✏️ 自定义情绪</h3>
            <div class="emo-edit-item"><input id="newEmoChar" placeholder="表情，如 😍"><input id="newEmoText" placeholder="备注，如 想念"><button class="btn-blue" id="addNewEmo">添加</button></div>
            <div class="emo-list-box" id="customEmoList"></div>
            <div class="btn-row"><button id="closeEmoEdit" class="btn-gray">关闭</button></div>
        </div>
    </div>

    <!-- 写信 -->
    <div class="mask" id="letterMask">
        <div class="pop">
            <h3>✉️ 写信给梦角</h3>
            <p style="font-size:14px;color:#6a5a7a;margin-bottom:10px;">信件会经过一段时间的邮递（1~30分钟），梦角收到后会回信 💌<br><span style="color:#9a8aaa;font-size:13px;">信件内容仅在「信件箱」中查看</span></p>
            <textarea id="letterContent" placeholder="写下你想对梦角说的话…"></textarea>
            <div class="btn-row">
                <button id="letterCancel" class="btn-gray">取消</button>
                <button id="letterSend" class="btn-gold">📨 寄出信件</button>
            </div>
        </div>
    </div>

    <!-- 信件箱 -->
    <div class="mask" id="mailboxMask">
        <div class="pop">
            <h3>📬 信件箱</h3>
            <p style="font-size:14px;color:#6a5a7a;margin-bottom:12px;">所有寄出和收到的信件记录</p>
            <div class="mail-list" id="mailListWrap"></div>
            <div class="btn-row">
                <button id="mailboxClose" class="btn-gray">关闭</button>
                <button id="mailboxClear" class="btn-red" style="font-size:13px;">清空所有信件</button>
            </div>
        </div>
    </div>

    <script>
        // ====================================================================
        //  ✉️  信件配置
        // ====================================================================
        const LETTER_DELAY_RANGE = { min: 1, max: 30 };
        const LETTER_REPLY_COUNT = { min: 2, max: 5 };
        const LETTERS_STORAGE_KEY = "dreamLetters";

        // ====================================================================
        //  核心变量
        // ====================================================================
        const REPLY_KEY = "dreamReplyList";
        const STORAGE_KEY = "dreamChatRecord";
        const USER_AVATAR_KEY = "userAvatar";
        const AI_AVATAR_KEY = "aiAvatar";
        const CALENDAR_KEY = "dreamCalendarData";
        const CUSTOM_EMO_KEY = "dreamCustomEmo";
        const SPEED_INDEX_KEY = "dreamSpeedIndex";

        let chatRecords = [];
        let replyList = [];
        let userAvatar = "";
        let aiAvatar = "";
        let calNowDate = new Date();
        let calActiveRole = "user";
        let calSelectEmo = "";
        let calendarData = {};
        const baseEmoList = ["😊", "🥰", "😐", "😔", "😠", "😴"];
        let customEmoList = [];
        let allEmoList = [];
        let currentDelayIndex = 2;
        let selectedDateKey = null;
        let letters = [];
        let pendingTimers = {};
        let msgCounter = 0;

        // ===== 状态管理 =====
        let currentStatus = 'idle'; // idle | sending | read | unread
        let isProcessing = false; // 防止重复发送

        // ===== 回复速度 =====
        const delayPresets = [
            { label: '即时', value: 0, sub: '0s' },
            { label: '快速', value: 500, sub: '0.5s' },
            { label: '中速', value: 1500, sub: '1.5s' },
            { label: '慢速', value: 60000, sub: '60s' },
            { label: '随机', value: 'random', sub: '0.5~120s' }
        ];

        function loadSpeedIndex() {
            const saved = localStorage.getItem(SPEED_INDEX_KEY);
            if (saved !== null) { const idx = parseInt(saved); if (idx >= 0 && idx < delayPresets.length) currentDelayIndex =
                    idx; }
        }

        function saveSpeedIndex() { localStorage.setItem(SPEED_INDEX_KEY, String(currentDelayIndex)); }

        function getDelay() {
            const preset = delayPresets[currentDelayIndex];
            if (preset.value === 'random') return 500 + Math.random() * 119500;
            return preset.value;
        }

        function updateSpeedDisplay() {
            const label = document.getElementById('menuSpeedLabel');
            const sub = document.getElementById('menuSpeedSub');
            if (label) label.textContent = delayPresets[currentDelayIndex].label;
            if (sub) sub.textContent = delayPresets[currentDelayIndex].sub;
        }

        function cycleSpeed() {
            currentDelayIndex = (currentDelayIndex + 1) % delayPresets.length;
            saveSpeedIndex();
            updateSpeedDisplay();
            showSystemMessage(`回复速度已切换为：${delayPresets[currentDelayIndex].label}`);
        }

        // ===== 状态显示更新 =====
        function setStatus(status, text = null) {
            const badge = document.getElementById('statusBadge');
            if (!badge) return;
            currentStatus = status;
            // 移除所有类
            badge.classList.remove('sending', 'read', 'unread');
            switch (status) {
                case 'idle':
                    badge.textContent = text || '💬 就绪';
                    break;
                case 'sending':
                    badge.classList.add('sending');
                    badge.textContent = text || '⏳ 发送中...';
                    break;
                case 'read':
                    badge.classList.add('read');
                    badge.textContent = text || '✅ 已读';
                    break;
                case 'unread':
                    badge.classList.add('unread');
                    badge.textContent = text || '❌ 未读';
                    break;
                default:
                    badge.textContent = text || '💬 就绪';
            }
        }

        // ===== 随机决定是否已读（70% 已读，30% 未读） =====
        function decideReadStatus() {
            return Math.random() < 0.7; // 70% 概率已读
        }

        // ===== 字卡导入 =====
        function parseImportText(rawText) {
            const result = [];
            const trimText = rawText.trim();
            if (!trimText) return result;
            try {
                const parsed = JSON.parse(trimText);
                if (Array.isArray(parsed)) {
                    for (const item of parsed) {
                        if (typeof item === 'string') { const clean = item.replace(/[\r\n]/g, '').trim(); if (clean) result
                                .push(clean); } else if (typeof item === 'number' || typeof item === 'boolean') { result
                                .push(String(item)); }
                    }
                    if (result.length > 0) return result;
                }
            } catch (_) {}
            const lines = trimText.split(/\r?\n/);
            for (const line of lines) {
                let clean = line.trim();
                if (!clean) continue;
                clean = clean.replace(/^["']|["']$/g, '').trim();
                if (clean.startsWith('[') && clean.endsWith(']')) {
                    const inner = clean.slice(1, -1).trim();
                    if (inner) {
                        const parts = inner.split(',').map(s => s.trim().replace(/^["']|["']$/g, '').trim());
                        for (const p of parts) if (p) result.push(p);
                        continue;
                    }
                }
                if (clean) result.push(clean);
            }
            return result;
        }

        // ===== 情绪存储 =====
        function loadCustomEmo() {
            const raw = localStorage.getItem(CUSTOM_EMO_KEY);
            if (raw) customEmoList = JSON.parse(raw);
            mergeAllEmo();
        }

        function saveCustomEmo() {
            localStorage.setItem(CUSTOM_EMO_KEY, JSON.stringify(customEmoList));
            mergeAllEmo();
        }

        function mergeAllEmo() { allEmoList = [...baseEmoList, ...customEmoList]; }

        // ===== 日历存储 =====
        function loadCalendarData() {
            const raw = localStorage.getItem(CALENDAR_KEY);
            if (raw) calendarData = JSON.parse(raw);
        }

        function saveCalendarData() { localStorage.setItem(CALENDAR_KEY, JSON.stringify(calendarData)); }

        function getDateKey(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, "0");
            const d = String(dateObj.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }

        function isDateInCurrentMonth(dateKey) {
            if (!dateKey) return false;
            const parts = dateKey.split('-');
            const year = parseInt(parts[0]);
            const month = parseInt(parts[1]) - 1;
            return (year === calNowDate.getFullYear() && month === calNowDate.getMonth());
        }

        // ===== 渲染情绪面板 =====
        function renderEmojiBox() {
            const box = document.getElementById("emojiBox");
            if (!box) return;
            box.innerHTML = "";
            allEmoList.forEach(emo => {
                const div = document.createElement("div");
                div.className = "emoji-item";
                div.dataset.emo = emo;
                div.textContent = emo;
                if (emo === calSelectEmo) div.classList.add("active");
                if (!baseEmoList.includes(emo)) {
                    const del = document.createElement("span");
                    del.className = "emo-del";
                    del.textContent = "×";
                    del.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm(`删除自定义情绪 ${emo}？`)) {
                            customEmoList = customEmoList.filter(item => item !== emo);
                            saveCustomEmo();
                            renderEmojiBox();
                            renderCalendar();
                        }
                    };
                    div.appendChild(del);
                }
                div.onclick = () => {
                    document.querySelectorAll(".emoji-item").forEach(i => i.classList.remove("active"));
                    div.classList.add("active");
                    calSelectEmo = emo;
                };
                box.appendChild(div);
            });
        }

        // ===== 渲染日历 =====
        function renderCalendar() {
            const y = calNowDate.getFullYear();
            const m = calNowDate.getMonth();
            const titleEl = document.getElementById("calTitle");
            if (titleEl) titleEl.textContent = `${y}年${m + 1}月`;
            if (selectedDateKey && !isDateInCurrentMonth(selectedDateKey)) selectedDateKey = null;
            const firstDay = new Date(y, m, 1);
            const lastDay = new Date(y, m + 1, 0);
            const startWeek = firstDay.getDay();
            const totalDays = lastDay.getDate();
            const today = new Date();
            const todayKey = getDateKey(today);
            const box = document.getElementById("calDaysBox");
            if (!box) return;
            box.innerHTML = "";
            for (let i = 0; i < startWeek; i++) { const empty = document.createElement("div");
                empty.className = "day-cell";
                box.appendChild(empty); }
            for (let d = 1; d <= totalDays; d++) {
                const cellDate = new Date(y, m, d);
                const key = getDateKey(cellDate);
                const cell = document.createElement("div");
                cell.className = "day-cell";
                if (key === todayKey) cell.classList.add("today");
                cell.dataset.date = key;
                if (key === selectedDateKey) { cell.style.background = "rgba(176, 136, 208, 0.15)"; } else { cell.style
                        .background = ""; }
                cell.innerHTML = `<span>${d}</span>`;
                if (calendarData[key]) {
                    const markSpan = document.createElement("span");
                    markSpan.className = "emo-mark";
                    if (calActiveRole === "user" && calendarData[key].user) { markSpan.textContent = calendarData[key]
                            .user; } else if (calActiveRole === "ai" && calendarData[key].ai) { markSpan.textContent =
                            calendarData[key].ai; }
                    if (markSpan.textContent) cell.appendChild(markSpan);
                }
                cell.onclick = () => { selectedDateKey = key;
                    renderCalendar(); };
                box.appendChild(cell);
            }
            const actionBtns = document.getElementById("calActionBtns");
            if (actionBtns) { if (calActiveRole === 'ai') { actionBtns.style.display = 'none'; } else { actionBtns.style
                        .display = 'grid'; } }
        }

        // ===== 自定义情绪列表 =====
        function renderCustomEmoList() {
            const wrap = document.getElementById("customEmoList");
            if (!wrap) return;
            wrap.innerHTML = "";
            if (customEmoList.length === 0) {
                const p = document.createElement("p");
                p.style.cssText = "color:#6a5a7a;font-size:14px;";
                p.textContent = "暂无自定义情绪";
                wrap.appendChild(p);
                return;
            }
            customEmoList.forEach(emo => {
                const row = document.createElement("div");
                row.className = "emo-row";
                const span = document.createElement("span");
                span.textContent = emo;
                row.appendChild(span);
                const btn = document.createElement("button");
                btn.className = "btn-red";
                btn.style.cssText = "font-size:12px;padding:2px 10px;border-radius:16px;border:none;";
                btn.textContent = "删除";
                btn.dataset.emo = emo;
                row.appendChild(btn);
                wrap.appendChild(row);
            });
            document.querySelectorAll("#customEmoList button").forEach(btn => {
                btn.onclick = () => {
                    const e = btn.dataset.emo;
                    customEmoList = customEmoList.filter(item => item !== e);
                    saveCustomEmo();
                    renderCustomEmoList();
                    renderEmojiBox();
                    renderCalendar();
                };
            });
        }

        // ===== 日历事件绑定 =====
        function bindCalendarEvent() {
            const tabUser = document.getElementById("tabUser");
            const tabAi = document.getElementById("tabAi");
            const calPrev = document.getElementById("calPrev");
            const calNext = document.getElementById("calNext");
            const calToday = document.getElementById("calToday");
            const calSave = document.getElementById("calSave");
            const calClearDay = document.getElementById("calClearDay");
            const calClose = document.getElementById("calClose");
            const openEditEmo = document.getElementById("openEditEmo");
            const closeEmoEdit = document.getElementById("closeEmoEdit");
            const addNewEmo = document.getElementById("addNewEmo");
            const calendarBtn = document.getElementById("menuCalendar");

            if (tabUser) tabUser.onclick = () => { calActiveRole = "user"; tabUser.classList.add("active"); if (tabAi) tabAi
                    .classList.remove("active"); renderCalendar(); };
            if (tabAi) tabAi.onclick = () => { calActiveRole = "ai"; tabAi.classList.add("active"); if (tabUser) tabUser
                    .classList.remove("active"); calSelectEmo = ""; renderCalendar(); };
            if (calPrev) calPrev.onclick = () => { calNowDate = new Date(calNowDate.getFullYear(), calNowDate.getMonth() - 1,
                    1); if (selectedDateKey && !isDateInCurrentMonth(selectedDateKey)) selectedDateKey = null;
                renderCalendar(); };
            if (calNext) calNext.onclick = () => { calNowDate = new Date(calNowDate.getFullYear(), calNowDate.getMonth() + 1,
                    1); if (selectedDateKey && !isDateInCurrentMonth(selectedDateKey)) selectedDateKey = null;

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 128;
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveLetters() {
            try {
                const saveData = letters.map(l => ({
                    id: l.id,
                    content: l.content,
                    sentAt: l.sentAt,
                    deliveredAt: l.deliveredAt,
                    status: l.status,
                    replies: l.replies || []
                }));
                localStorage.setItem(LETTERS_STORAGE_KEY, JSON.stringify(saveData));
            } catch (e) { console.warn("保存信件失败:", e); }
        }

        function loadLetters() {
            const raw = localStorage.getItem(LETTERS_STORAGE_KEY);
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    letters = parsed.map(l => ({
                        ...l,
                        timer: null,
                        delivered: l.status === 'delivered' || l.status === 'replied',
                        replied: l.status === 'replied'
                    }));
                    return true;
                } catch (e) { console.warn("解析信件数据失败:", e); }
            }
            return false;
        }

        function addLetter(content, delayMs) {
            const letter = {
                id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                content: content,
                sentAt: Date.now(),
                deliveredAt: null,
                status: 'sent',
                replies: [],
                timer: null,
                delivered: false,
                replied: false
            };
            letters.push(letter);
            saveLetters();
            const timerId = setTimeout(() => { deliverLetter(letter.id); }, delayMs);
            letter.timer = timerId;
            pendingTimers[letter.id] = timerId;
            return letter;
        }

        function deliverLetter(letterId) {
            const letter = letters.find(l => l.id === letterId);
            if (!letter || letter.delivered) return;
            letter.delivered = true;
            letter.deliveredAt = Date.now();
            letter.status = 'delivered';
            if (letter.timer) { clearTimeout(letter.timer);
                delete letter.timer;
                delete pendingTimers[letterId]; }
            saveLetters();
            renderMailList();
            const readDelay = 2000 + Math.random() * 4000;
            setTimeout(() => {
                if (replyList.length === 0) {
                    letter.replies = ["📭 字卡库为空，无法回信"];
                    letter.status = 'replied';
                    letter.replied = true;
                    saveLetters();
                    renderMailList();
                    return;
                }
                const count = LETTER_REPLY_COUNT.min + Math.floor(Math.random() * (LETTER_REPLY_COUNT.max - LETTER_REPLY_COUNT
                    .min + 1));
                const selected = [];
                const shuffled = [...replyList].sort(() => Math.random() - 0.5);
                for (let i = 0; i < Math.min(count, shuffled.length); i++) selected.push(shuffled[i]);
                while (selected.length < count && replyList.length > 0) {
                    selected.push(replyList[Math.floor(Math.random() * replyList.length)]);
                }
                letter.replies = selected;
                letter.status = 'replied';
                letter.replied = true;
                saveLetters();
                renderMailList();
                recordAiEmotion();
            }, readDelay);
        }

        // ===== 渲染信件箱 =====
        function renderMailList() {
            const wrap = document.getElementById("mailListWrap");
            if (!wrap) return;
            wrap.innerHTML = "";
            if (letters.length === 0) {
                const p = document.createElement("p");
                p.style.cssText = "text-align:center;color:#9a8aaa;padding:20px 0;";
                p.textContent = "📭 暂无信件";
                wrap.appendChild(p);
                return;
            }
            const sorted = [...letters].sort((a, b) => b.sentAt - a.sentAt);
            sorted.forEach(letter => {
                const div = document.createElement("div");
                div.className = "mail-item";
                const statusMap = { 'sent': '📮 投递中', 'delivered': '📬 已送达', 'replied': '💌 已回信' };
                const statusText = statusMap[letter.status] || letter.status;
                const sentDate = new Date(letter.sentAt);
                const timeStr = sentDate.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit',
                    minute: '2-digit' });
                let statusClass = '';
                if (letter.status === 'delivered') statusClass = 'delivered';
                if (letter.status === 'replied') statusClass = 'replied';
                div.innerHTML = `
                    <div class="mail-header">
                        <span>📨 ${timeStr}</span>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="mail-content">${letter.content}</div>
                    ${letter.replies && letter.replies.length > 0 ? 
                        `<div class="mail-reply">${letter.replies.slice(0, 3).join(' · ')}${letter.replies.length > 3 ? ' ...' : ''}</div>` : 
                        ''}
                `;
                div.onclick = () => {
                    let detail = `✉️ 信件详情\n\n`;
                    detail += `📅 发送时间: ${new Date(letter.sentAt).toLocaleString()}\n`;
                    detail += `📝 内容: ${letter.content}\n`;
                    detail += `📮 状态: ${statusText}\n`;
                    if (letter.deliveredAt) {
                        detail += `📬 送达时间: ${new Date(letter.deliveredAt).toLocaleString()}\n`;
                    }
                    if (letter.replies && letter.replies.length > 0) {
                        detail += `\n💌 回信 (${letter.replies.length}条):\n`;
                        letter.replies.forEach((r, i) => { detail += `  ${i+1}. ${r}\n`; });
                    }
                    alert(detail);
                };
                wrap.appendChild(div);
            });
        }

        function restorePendingLetters() {
            const pending = letters.filter(l => l.status === 'sent' && !l.delivered);
            if (pending.length === 0) return;
            const now = Date.now();
            pending.forEach(letter => {
                const elapsed = now - letter.sentAt;
                const avgDelay = (LETTER_DELAY_RANGE.min + LETTER_DELAY_RANGE.max) / 2 * 60 * 1000;
                let remaining = avgDelay - elapsed;
                if (remaining < 1000) remaining = 1000;
                const timerId = setTimeout(() => { deliverLetter(letter.id); }, remaining);
                letter.timer = timerId;
                pendingTimers[letter.id] = timerId;
                saveLetters();
            });
        }

            saveLetters();
            textarea.value = "";
            renderMailList();
            alert(`📮 信件已寄出，预计 ${Math.round(delayMin)} 分钟后送达\n💡 可在「信件箱」中查看进度和回信`);
        }

        function appendMessageWithId(sender, text, isUser = false, timestamp = null, isLetter = false) {

                const now = timestamp || Date.now();

            const row = document.createElement("div");
            row.className = `chat-row ${isUser ? "user" : "ai"}`;
            row.dataset.msgId = msgId;
            const avatar = document.createElement("div");
            avatar.className = "avatar";
            const avatarSrc = isUser ? userAvatar : aiAvatar;
            if (avatarSrc) avatar.innerHTML = `<img src="${avatarSrc}" alt="">`;
            const bubble = document.createElement("div");
            const bubbleClass = `chat-item ${isUser ? "user" : "ai"}`;
            bubble.className = bubbleClass;
            const textSpan = document.createElement("span");
            textSpan.textContent = text;
            bubble.appendChild(textSpan);
            if (timestamp !== null && timestamp !== undefined) {
                const timeDiv = document.createElement("div");
                timeDiv.className = "msg-time";
                const date = new Date(timestamp);
                if (!isNaN(date.getTime())) {
                    const hours = String(date.getHours()).padStart(2, "0");
                    const minutes = String(date.getMinutes()).padStart(2, "0");
                    timeDiv.textContent = `${hours}:${minutes}`;
                    bubble.appendChild(timeDiv);
                }
            }
            if (isUser) { row.appendChild(bubble);
                row.appendChild(avatar); } else { row.appendChild(avatar);
                row.appendChild(bubble); }
            const anchor = document.getElementById("scrollAnchor");
            if (anchor) { box.insertBefore(row, anchor); } else { box.appendChild(row); }
            const now = timestamp || Date.now();
            chatRecords.push({ sender, text, isUser, timestamp: now, isLetter: false, msgId: msgId });
            if (chatRecords.length > 500) chatRecords = chatRecords.slice(-500);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatRecords));
            scrollToBottom();
            return msgId;
        }

        function initChatRecord() {
            const local = localStorage.getItem(STORAGE_KEY);
            const chatBox = document.getElementById("chatBox");
            if (!chatBox) return;
            if (!local) {
                chatRecords = [];
                showSystemMessage("✨ 已成功建立心灵链接，随时可以向我倾诉");
                return;

            try {
                chatRecords = JSON.parse(local);

                    chatRecords = chatRecords.slice(-MAX_RECORDS);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(chatRecords));
                }
                chatRecords.forEach(item => {
                    if (item.isLetter) return;
                    const ts = item.timestamp || null;
                    const sender = item.sender || (item.isUser ? "你" : "梦角");
                    appendMessage(sender, item.text, item.isUser, false, ts, false);
                });

                console.warn("解析聊天记录失败:", e);
                chatRecords = [];
                showSystemMessage("✨ 已重新建立心灵链接");

        function scrollToBottom() {

            const box = document.getElementById("chatBox");
            if (box) box.scrollTop = box.scrollHeight;

        function sendMultipleMessages(messages, interval = 500) {
            if (!messages || messages.length === 0) return;
            let index = 0;

            function sendNext() {
                if (index >= messages.length) return;
                const msg = messages[index];
                appendMessage("梦角", msg, false, true);
                index++;
                if (index < messages.length) { setTimeout(sendNext, interval); }
            }
            sendNext();
        }

        // ============================================================
        //  【核心】发送消息 - 随机决定是否已读
        // ============================================================
        function sendMsg() {
            const input = document.getElementById("msgInput");
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            if (isProcessing) return;

            // 锁定发送按钮
            isProcessing = true;
            const sendBtn = document.getElementById("sendBtn");
            sendBtn.disabled = true;

            // 显示用户消息
            appendMessage("你", text, true, true);
            input.value = "";

            // 更新状态为「发送中」
            setStatus('sending', '⏳ 发送中...');

            // 获取延迟时间
            const delayMs = getDelay();

            // 延迟后决定是否已读
            setTimeout(() => {
                // 随机决定是否已读（70% 已读）
                const isRead = decideReadStatus();

                if (isRead) {
                    // ✅ 已读 → 显示已读状态 + 回复
                    setStatus('read', '✅ 已读');
                    // 记录已读情绪
                    recordAiEmotion();

                    // 再延迟一点后回复（模拟思考）
                    setTimeout(() => {
                        if (replyList.length === 0) {
                            appendMessage("梦角", "📭 暂无回复字卡，请先导入文案", false);
                        } else {
                            const count = Math.floor(Math.random() * 5) + 1;
                            const selected = [];
                            const shuffled = [...replyList].sort(() => Math.random() - 0.5);
                            for (let i = 0; i < Math.min(count, shuffled.length); i++) {
                                selected.push(shuffled[i]);
                            }
                            while (selected.length < count && replyList.length > 0) {
                                selected.push(replyList[Math.floor(Math.random() * replyList.length)]);
                            }
                            sendMultipleMessages(selected, 500);
                        }
                        // 解锁
                        isProcessing = false;
                        sendBtn.disabled = false;
                        setStatus('idle', '💬 就绪');
                    }, 300 + Math.random() * 500);

                } else {
                    // ❌ 未读 → 显示未读状态，不回复
                    setStatus('unread', '❌ 未读');
                    // 解锁（但保持未读状态几秒后自动恢复）
                    setTimeout(() => {
                        isProcessing = false;
                        sendBtn.disabled = false;
                        setStatus('idle', '💬 就绪');
                    }, 2000);
                }
            }, delayMs);
        }

            document.getElementById("menuSpeed").addEventListener("click", function(e) { e.stopPropagation();
                cycleSpeed(); });
            document.getElementById("menuClear").addEventListener("click", function() { closeFuncMenu();
                setTimeout(() => {
                    if (confirm("确定清空全部聊天记录？")) {
                        localStorage.removeItem(STORAGE_KEY);
                        chatRecords = [];
                        const chatBox = document.getElementById("chatBox");
                        if (chatBox) chatBox.innerHTML = `<div class="scroll-anchor" id="scrollAnchor"></div>`;
                        showSystemMessage("✨ 已重新建立心灵链接");
                    }
                }, 200); });

            // ---- 发送 ----
            document.getElementById("sendBtn").addEventListener("click", sendMsg);
            document.getElementById("msgInput").addEventListener("keydown", function(e) {
                if (e.key === 'Enter') sendMsg();
            });

            // ---- 头像 ----
            document.getElementById("avatarCancel").addEventListener("click", function() {
                document.getElementById("avatarMask").style.display = "none";
            });
            document.getElementById("avatarConfirm").addEventListener("click", function() {
                localStorage.setItem(USER_AVATAR_KEY, userAvatar);
                localStorage.setItem(AI_AVATAR_KEY, aiAvatar);
                alert("头像已保存！");
                document.getElementById("avatarMask").style.display = "none";
            });
            document.getElementById("userAvatarInput").addEventListener("change", function(e) {
                const f = e.target.files[0];
                if (!f) return;
                compressImage(f, function(dataUrl) { userAvatar = dataUrl;
                    refreshAvatarPreviews(); });
            });
            document.getElementById("aiAvatarInput").addEventListener("change", function(e) {
                const f = e.target.files[0];
                if (!f) return;
                compressImage(f, function(dataUrl) { aiAvatar = dataUrl;
                    refreshAvatarPreviews(); });
            });

            // ---- 导入 ----
            document.getElementById("importCancel").addEventListener("click", function() {
                document.getElementById("importMask").style.display = "none";
                document.getElementById("textArea").value = "";
                document.getElementById("fileInput").value = "";
            });
            document.getElementById("importConfirm").addEventListener("click", async function() {
                let totalArr = [];
                const textRaw = document.getElementById("textArea").value.trim();
                if (textRaw) totalArr = totalArr.concat(parseImportText(textRaw));
                const file = document.getElementById("fileInput").files[0];
                if (file) {
                    try { const fileText = await file.text();
                        totalArr = totalArr.concat(parseImportText(fileText)); } catch (err) { alert(
                            "文件读取失败：" + err.message); return; }
                }
                const unique = [];
                const seen = new Set();
                for (const item of totalArr) {
                    const key = item.trim();
                    if (key && !seen.has(key)) { seen.add(key);
                        unique.push(key); }
                }
                if (unique.length === 0) { alert("未检测到有效字卡内容！支持文本、JSON 或文件"); return; }
                replyList = [...replyList, ...unique];
                saveReply();
                renderCardList();
                alert(`✅ 导入成功！新增 ${unique.length} 条字卡`);
                document.getElementById("importMask").style.display = "none";
                document.getElementById("textArea").value = "";
                document.getElementById("fileInput").value = "";
            });

            // ---- 字卡库 ----
            document.getElementById("viewCardClose").addEventListener("click", function() {
                document.getElementById("viewCardMask").style.display = "none";
            });

            // ---- 写信 ----
            document.getElementById("letterCancel").addEventListener("click", function() {
                document.getElementById("letterMask").style.display = "none";
            });
            document.getElementById("letterSend").addEventListener("click", sendLetter);
            document.getElementById("letterContent").addEventListener("keydown", function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault();
                    sendLetter(); }
            });

            // ---- 信件箱 ----
            document.getElementById("mailboxClose").addEventListener("click", function() {
                document.getElementById("mailboxMask").style.display = "none";
            });
            document.getElementById("mailboxClear").addEventListener("click", function() {
                if (confirm("确定清空所有信件记录？此操作不可恢复！")) {
                    letters = [];
                    localStorage.removeItem(LETTERS_STORAGE_KEY);
                    Object.values(pendingTimers).forEach(t => clearTimeout(t));
                    pendingTimers = {};
                    renderMailList();
                    alert("已清空所有信件");
                }
            });

            // ---- 日历 ----
            document.getElementById("calClose").addEventListener("click", function() {
                document.getElementById("calendarMask").style.display = "none";
            });

            // ---- 情绪编辑 ----
            document.getElementById("closeEmoEdit").addEventListener("click", function() {
                document.getElementById("emoEditMask").style.display = "none";
            });

            // ---- 加载聊天记录 ----
            initChatRecord();
        };
    </script>
</body>
</html>
